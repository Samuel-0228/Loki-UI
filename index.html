<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Time Café</title>
    <!-- Elegant fonts: Playfair Display for headers, Outfit for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Background overlay container -->
    <div class="bg-container">
        <!-- Hero background image -->
    </div>
    
    <nav class="navbar">
      <div class="logo">The Time Café</div>
      <ul class="nav-links">
        <li><a href="#menu">Menu</a></li>
        <li><a href="#atmosphere">Atmosphere</a></li>
        <li><a href="#reservations">Reservations</a></li>
      </ul>
    </nav>

    <main class="hero">
      <div class="glass-card fade-in">
        <h1 class="hero-title">
          <span class="orange-text">25</span><br>
          Time Café
        </h1>
        <p class="hero-subtitle">Where time stops, and flavor begins.</p>
        <button class="cta-button">Enter the Sphere</button>
      </div>
      
      <!-- Subtle atmospheric glowing spot in the scene -->
      <div class="sphere-glow"></div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
